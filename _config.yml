title: Yashaswini Mathur
description: A research and narrative portfolio in graphs, plays, and proof trails.
url: "https://yashaswinimathur.github.io"
baseurl: ""
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dark"
locale: en-US

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

collections:
  research:
    output: true
    permalink: /research/:name/
  journey:
    output: true
    permalink: /journey/:name/

defaults:
  - scope:
      path: ""
      type: "research"
    values:
      layout: single
      read_time: true
      author_profile: true
      share: false
  - scope:
      path: ""
      type: "journey"
    values:
      layout: single
      read_time: false
      author_profile: false

# Optional: Add analytics, mathjax, etc. later
